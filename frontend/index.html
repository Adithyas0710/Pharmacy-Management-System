<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pharmacy Billing System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h2>Pharmacy Billing System</h2>
  </header>
  <div class="container">
    <h2>Billing</h2>
    <form id="billingForm">
      <div class="form-group">
        <label for="name">Customer Name:</label>
        <input id="name" type="text" placeholder="Enter customer name" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input id="phone" type="tel" placeholder="Enter phone number" required>
      </div>
      <div class="form-group">
        <label for="med">Medicine Name:</label>
        <input id="med" type="text" placeholder="Enter medicine name" required>
      </div>
      <div class="form-group">
        <label for="qty">Quantity:</label>
        <input id="qty" type="number" placeholder="Enter quantity" required>
      </div>
      <div class="form-group">
        <label for="price">Price per Unit:</label>
        <input id="price" type="number" step="0.01" placeholder="Enter price" required>
      </div>
      <div class="form-group">
        <label for="total">Total Amount:</label>
        <input id="total" type="number" step="0.01" placeholder="Calculated total" readonly>
      </div>
      <div class="form-group">
        <label for="payment">Payment Mode:</label>
        <select id="payment">
          <option value="Cash">Cash</option>
          <option value="UPI">UPI</option>
          <option value="Card">Card</option>
        </select>
      </div>
      <button type="button" onclick="calculateTotal()">Calculate Total</button>
      <button type="button" onclick="add()">Save Transaction</button>
    </form>
    <div class="links">
      <a href="search.html">Search Customer</a>
      <a href="inventory.html">Inventory</a>
      <a href="summary.html">Daily Summary</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
